name: Publish AUR package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh rust libxkbcommon wayland curl

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version and sha256sum
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          URL="https://github.com/nabiko02/recway/archive/v${VERSION}.tar.gz"
          SUM=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/sha256sums=.*/sha256sums=('${SUM}')/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          useradd builder -m
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.0
        with:
          pkgname: recway
          pkgbuild: ./PKGBUILD
          commit_username: "Nabiko02"
          commit_email: "Lusty3418Charger1631Retold5412@proton.me"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.get_version.outputs.version }}"
          ssh_keyscan_types: ed25519
          force_push: true
